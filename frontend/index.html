<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ZhirovKA</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="/assets/css/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar border-end">
        <div class="brand">
          <i class="bi bi-receipt-cutoff"></i>
          <span>ZhirovKA</span>
        </div>

        <nav class="nav nav-pills flex-column gap-1" aria-label="Основная навигация">
          <a class="nav-link" href="#/dashboard" data-route="dashboard">
            <i class="bi bi-speedometer2"></i>
            <span>Дашборд</span>
          </a>
          <a class="nav-link" href="#/objects" data-route="objects">
            <i class="bi bi-buildings"></i>
            <span>Объекты</span>
          </a>
          <a class="nav-link" href="#/tariffs" data-route="tariffs">
            <i class="bi bi-cash-coin"></i>
            <span>Тарифы</span>
          </a>
          <a class="nav-link" href="#/monthly" data-route="monthly">
            <i class="bi bi-calendar3"></i>
            <span>Данные месяца</span>
          </a>
        </nav>
      </aside>

      <div class="content-shell">
        <header class="topbar border-bottom">
          <button
            class="btn btn-outline-secondary d-lg-none"
            type="button"
            data-bs-toggle="offcanvas"
            data-bs-target="#mobileNav"
            aria-controls="mobileNav"
            aria-label="Открыть навигацию"
          >
            <i class="bi bi-list"></i>
          </button>
          <div>
            <h1 class="h4 mb-0" id="pageTitle">Дашборд</h1>
            <div class="text-secondary small" id="pageSubtitle">Обзор начислений и расходов</div>
          </div>
        </header>

        <main class="main-content" id="app" tabindex="-1"></main>
      </div>
    </div>

    <div class="offcanvas offcanvas-start" tabindex="-1" id="mobileNav" aria-labelledby="mobileNavTitle">
      <div class="offcanvas-header">
        <h2 class="offcanvas-title h5" id="mobileNavTitle">ZhirovKA</h2>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Закрыть"></button>
      </div>
      <div class="offcanvas-body">
        <nav class="nav nav-pills flex-column gap-1" aria-label="Мобильная навигация">
          <a class="nav-link" href="#/dashboard" data-route="dashboard" data-mobile-link>
            <i class="bi bi-speedometer2"></i>
            <span>Дашборд</span>
          </a>
          <a class="nav-link" href="#/objects" data-route="objects" data-mobile-link>
            <i class="bi bi-buildings"></i>
            <span>Объекты</span>
          </a>
          <a class="nav-link" href="#/tariffs" data-route="tariffs" data-mobile-link>
            <i class="bi bi-cash-coin"></i>
            <span>Тарифы</span>
          </a>
          <a class="nav-link" href="#/monthly" data-route="monthly" data-mobile-link>
            <i class="bi bi-calendar3"></i>
            <span>Данные месяца</span>
          </a>
        </nav>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script type="module" src="/assets/js/app.js"></script>
  </body>
</html>
