services:
  db:
    image: postgres:16-alpine
    container_name: zhirovka-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zhirovka}
      POSTGRES_USER: ${POSTGRES_USER:-zhirovka}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zhirovka_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zhirovka} -d ${POSTGRES_DB:-zhirovka}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/sanchoys/zhirovka:latest
    container_name: zhirovka-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-zhirovka}:${POSTGRES_PASSWORD:-zhirovka_password}@${POSTGRES_HOST:-db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-zhirovka}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_HOST_PORT:-5000}:5000"

volumes:
  postgres_data:
